<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba GitHub</title>

  <style>

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f4f4f4;
      text-align:center;
    }

    header{
      background:#1c7c6c;
      color:white;
      padding:40px;
    }

    main{
      padding:40px;
    }

    .card{
      background:white;
      max-width:500px;
      margin:auto;
      padding:30px;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    .boton{
      display:inline-block;
      margin-top:20px;
      background:#1c7c6c;
      color:white;
      padding:12px 20px;
      text-decoration:none;
      border-radius:8px;
    }

    .boton:hover{
      background:#145c50;
    }

    footer{
      margin-top:40px;
      background:#1c7c6c;
      color:white;
      padding:15px;
    }

  </style>

</head>
<body>

<header>

  <h1>Mi Primera Página en este lugar</h1>

  <p>Prueba de publicación web</p>

</header>

<main>

  <div class="card">

    <h2>¡Funciona!</h2>

    <p>
      Si estás viendo esta página en internet,
      entonces GitHub Pages funciona correctamente.
    </p>

    <a href="#" class="boton">
      Botón de prueba
    </a>

  </div>

</main>

<footer>

  <p>© 2026 Prueba GitHub</p>

</footer>

</body>
</html>
